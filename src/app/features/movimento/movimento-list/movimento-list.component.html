<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white m-0">MOVIMENTOS</h2>

    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-orange" (click)="novoMovimento()">
        + Novo
      </button>
    </div>
  </div>

  <div class="d-flex flex-column gap-3">

    <div class="card bg-dark text-white"
         *ngFor="let movimento of movimentos; trackBy: trackById">

      <div class="card-body d-flex align-items-center">

        <strong class="me-3">
          {{ movimento.nome }}
        </strong>

        <span class="badge bg-warning text-dark">
          {{ movimento.tipo }}
        </span>

        <span class="ms-auto fs-5 cursor-pointer"
              (click)="excluir(movimento.id!)">
          🗑
        </span>

      </div>

    </div>

  </div>

</div>
