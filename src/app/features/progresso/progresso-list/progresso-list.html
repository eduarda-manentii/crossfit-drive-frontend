<div class="container mt-4">
  <h2 class="text-white mb-4 fw-bold">PROGRESSO</h2>

  <div class="filters-container mb-4">
    <div class="d-flex align-items-center gap-2 mb-3 text-secondary">
      <span class="small fw-bold text-uppercase">Filtros</span>
    </div>
    
    <div class="row g-3">
      <div class="col-md-6">
        <label class="text-secondary small mb-1">Período</label>
        <select class="form-select custom-select" [(ngModel)]="filtroPeriodo" (change)="carregarDados()">
          <option [value]="30">30 dias</option>
          <option [value]="60">60 dias</option>
          <option [value]="90">90 dias</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="text-secondary small mb-1">Movimento</label>
        <select class="form-select custom-select" [(ngModel)]="filtroMovimento" (change)="carregarDados()">
          <option value="todos">Todos</option>
          <option *ngFor="let m of movimentos" [value]="m.id">{{ m.nome }}</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-5">
  
  <div class="col-md-4">
      <div class="metric-card">
        <span class="material-icons orange">calendar_month</span>
        <h2 class="value">{{ stats.diasTreinados }}</h2>
        <span class="label">Dias treinados</span>
      </div>
    </div>

    <div class="col-md-4">
      <div class="metric-card">
        <span class="material-icons orange">fitness_center</span>
        <h2 class="value">{{ stats.totalWods }}</h2>
        <span class="label">Total WODs</span>
      </div>
    </div>

    <div class="col-md-4">
      <div class="metric-card">
        <span class="material-icons orange">show_chart</span>
        <h2 class="value">{{ stats.mediaMinutos || '-' }}</h2>
        <span class="label">Média (min)</span>
      </div>
    </div>
  </div>

  <div class="empty-state text-center py-5" *ngIf="stats.totalWods === 0">
    <p class="text-secondary">Registre treinos para ver seu progresso</p>
  </div>

</div>
